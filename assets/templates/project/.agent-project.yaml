# Connected project metadata for bedrock.

version: 4
ontology_model: 2

project:
  name: <project-name>
  slug: <project-slug>
  repo_root: .
  profile_hint: unknown

knowledge:
  vault_mode: <vault-mode>
  pointer_path: ./bedrock
  real_path: <absolute-path-to-dedicated-knowledge-folder>
  ignore_file: ./.agentknowledgeignore
  memory_root: ./bedrock/Memory/MEMORY.md
  evidence_raw: ./bedrock/Evidence/raw
  evidence_imports: ./bedrock/Evidence/imports
  outputs_root: ./bedrock/Outputs
  dashboards_root: ./bedrock/Dashboards
  obsidian_mode: lightweight

onboarding:
  status: pending

sync:
  bootstrap_on_connect: true
  import_evidence_on_sync: true
  graph_import_optional: true
  compact_memory_on_ship: true

hooks:
  cursor_hooks_file: ./.cursor/hooks.json
  project_sync_command: bedrock update --project .
  graph_sync_command: bedrock graphify-sync --project .
