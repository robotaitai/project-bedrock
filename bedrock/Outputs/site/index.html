<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>agent-knowledge — Knowledge</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#1c2128;--surface-3:#21262d;
  --border:#30363d;--border-2:#21262d;
  --text:#e6edf3;--text-2:#cdd9e5;--muted:#8b949e;--muted-2:#6e7681;
  --accent:#58a6ff;--accent-muted:#1f6feb;
  --mem-bg:#031d44;--mem-fg:#79c0ff;--mem-border:#1f6feb;
  --ev-bg:#1b0045;--ev-fg:#d2a8ff;--ev-border:#6e40c9;
  --out-bg:#2d1b00;--out-fg:#e3b341;--out-border:#9e6a03;
  --ok:#3fb950;--warn-bg:#3a2000;--warn-fg:#d29922;
  --radius:8px;--radius-sm:5px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;line-height:1.6}

/* ---- LAYOUT ---- */
#root{display:grid;grid-template-columns:268px 1fr;grid-template-rows:100vh;overflow:hidden}

/* ---- SIDEBAR ---- */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.sidebar-logo-mark{width:16px;height:16px;background:var(--accent);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;color:#0d1117;font-weight:900;font-size:9px;flex-shrink:0}
.sidebar-project-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
#sidebar-tree{flex:1;overflow-y:auto;padding:6px 0}
.tree-group{margin-bottom:2px}
.tree-group-header{padding:7px 12px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);display:flex;align-items:center;gap:7px;user-select:none}
.tree-group-header .count{background:var(--surface-2);border-radius:9px;padding:0 5px;font-size:9px;margin-left:auto}
.tree-item{padding:5px 12px 5px 18px;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s,color .1s;border-radius:0}
.tree-item:hover{background:var(--surface-2);color:var(--text-2)}
.tree-item.active{background:var(--surface-2);color:var(--accent)}
.tree-item.leaf{padding-left:30px;font-size:12px}
.tree-item.branch{font-weight:500}
.tree-item-icon{font-size:10px;flex-shrink:0;opacity:.7}
.tree-item-label{overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-sep{height:1px;background:var(--border-2);margin:6px 12px}
.sidebar-footer{padding:9px 12px;border-top:1px solid var(--border);flex-shrink:0;font-size:10px;color:var(--muted-2);line-height:1.5}

/* ---- MAIN ---- */
#main{display:flex;flex-direction:column;overflow:hidden;position:relative;height:100%}

/* ---- TOPBAR ---- */
#topbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:6;position:relative}
#breadcrumb{flex:1;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;overflow:hidden}
#breadcrumb a{color:var(--accent);text-decoration:none;flex-shrink:0}
#breadcrumb a:hover{text-decoration:underline}
.bc-sep{color:var(--muted-2);flex-shrink:0}
.bc-current{color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar-tabs{display:flex;gap:3px;flex-shrink:0}
.tab-btn{background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;font-size:12px;padding:4px 11px;transition:all .15s}
.tab-btn:hover{color:var(--text);background:var(--surface-2)}
.tab-btn.active{color:var(--accent);border-color:var(--mem-border);background:var(--mem-bg)}

/* ---- CONTENT ---- */
#view-wrap{flex:1;position:relative;overflow:hidden}
#content{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding:0}
.view-wrap{max-width:900px;margin:0 auto;padding:28px 32px}

/* ---- OVERVIEW ---- */
.ov-header{padding-bottom:20px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.ov-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:9px}
.ov-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted)}
.ov-meta-item{display:flex;align-items:center;gap:4px}
.status-ok{color:var(--ok)}
.status-pending{color:var(--warn-fg)}
.sep-dot{color:var(--border)}

.warnings-box{background:var(--warn-bg);border:1px solid var(--warn-fg);border-radius:var(--radius);padding:13px 15px;margin-bottom:22px}
.warnings-box h3{color:var(--warn-fg);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.warn-item{color:var(--warn-fg);font-size:13px;margin-bottom:4px;display:flex;gap:7px}
.warn-item::before{content:"!";flex-shrink:0;font-weight:700}

.section{margin-bottom:32px}
.section-heading{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.section-heading::after{content:"";flex:1;height:1px;background:var(--border)}

.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.branch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.branch-card:hover{border-color:var(--accent);background:var(--surface-2)}
.branch-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:6px}
.branch-card-title{font-weight:600;font-size:13px;color:var(--text);flex:1}
.branch-card-purpose{font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:6px}
.branch-card-foot{font-size:10.5px;color:var(--muted-2);display:flex;gap:8px;align-items:center;margin-top:auto}
.bc-changes{color:var(--ok);font-weight:600}
.bc-updated{color:var(--muted-2);margin-left:auto}

.changes-list{display:flex;flex-direction:column;gap:1px}
.change-row{display:grid;grid-template-columns:90px auto 1fr;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border-2);font-size:13px}
.change-date{color:var(--muted-2);font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}
.change-branch-tag{color:var(--mem-fg);font-size:10px;font-weight:600;background:var(--mem-bg);border-radius:9px;padding:1px 7px;white-space:nowrap}
.change-text{color:var(--text-2)}

.decision-list{display:flex;flex-direction:column;gap:6px}
.decision-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--mem-border);border-radius:var(--radius-sm);padding:9px 12px;cursor:pointer;transition:border-color .15s}
.decision-item:hover{border-color:var(--accent)}
.decision-item-title{font-size:13px;font-weight:500;color:var(--accent);margin-bottom:3px}
.decision-item-what{font-size:12px;color:var(--muted)}
.decision-item-date{font-size:11px;color:var(--muted-2);margin-top:4px}

.question-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.question-item{font-size:13px;display:flex;gap:9px;align-items:baseline}
.q-branch{font-size:10px;color:var(--muted);background:var(--surface);border-radius:9px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
.q-text{color:var(--text-2)}

/* ---- NOTE VIEW ---- */
.note-wrap{max-width:760px;margin:0 auto;padding:28px 32px}
.note-breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-bottom:18px;flex-wrap:wrap}
.note-breadcrumb a{color:var(--accent);text-decoration:none}
.note-breadcrumb a:hover{text-decoration:underline}
.note-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.note-badges{display:flex;gap:6px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.note-type-label{font-size:11px;color:var(--muted)}
.note-title{font-size:23px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px;color:var(--text)}
.note-meta{display:flex;gap:11px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.note-canonical{color:var(--ok)}
.note-non-canonical{color:var(--ev-fg)}

.nc-warning{background:#1a0a00;border:1px solid var(--ev-border);border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:18px;font-size:12px;color:var(--ev-fg)}

/* Note body markdown */
.note-body{color:var(--text-2);line-height:1.75}
.note-body h1{font-size:20px;font-weight:700;margin:22px 0 10px;color:var(--text)}
.note-body h2{font-size:16px;font-weight:600;margin:20px 0 8px;color:var(--text-2);padding-bottom:5px;border-bottom:1px solid var(--border)}
.note-body h3{font-size:14px;font-weight:600;margin:16px 0 6px;color:var(--text-2)}
.note-body h4{font-size:13px;font-weight:600;margin:12px 0 5px;color:var(--muted)}
.note-body p{margin:7px 0}
.note-body ul,.note-body ol{margin:7px 0 7px 20px}
.note-body li{margin:3px 0}
.note-body code{background:var(--surface-2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:ui-monospace,"Cascadia Code","Fira Code",monospace;font-size:12px;color:var(--text-2)}
.note-body pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;overflow-x:auto;margin:12px 0}
.note-body pre code{background:none;border:none;padding:0;font-size:12.5px}
.note-body blockquote{border-left:3px solid var(--accent);padding:2px 0 2px 14px;color:var(--muted);margin:10px 0}
.note-body a{color:var(--accent)}
.note-body a.wikilink{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent);cursor:pointer}
.note-body a.wikilink:hover{border-bottom-style:solid}
.note-body a.wikilink-missing{color:var(--muted);border-bottom:1px dashed var(--muted);cursor:default}
.note-body hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.note-body .mermaid{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:14px 0;overflow-x:auto;text-align:center}
.note-body .mermaid svg{max-width:100%;height:auto}
.note-body table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13px}
.note-body th{background:var(--surface-2);padding:6px 12px;text-align:left;border:1px solid var(--border);font-weight:600;color:var(--text-2)}
.note-body td{padding:6px 12px;border:1px solid var(--border);color:var(--text-2)}
.note-body strong{color:var(--text);font-weight:600}
.note-body em{color:var(--text-2)}

.related-section{margin-top:30px;padding-top:18px;border-top:1px solid var(--border)}
.related-section h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-2);margin-bottom:10px}
.related-list{display:flex;flex-direction:column;gap:5px}
.related-item{display:flex;flex-direction:column;gap:3px;text-decoration:none;padding:9px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);transition:border-color .15s}
.related-item:hover{border-color:var(--accent)}
.related-item-title{color:var(--accent);font-size:13px;font-weight:500}
.related-item-summary{color:var(--muted);font-size:12px}

/* ---- EVIDENCE VIEW ---- */
.evidence-list{display:flex;flex-direction:column;gap:8px}
.ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:border-color .15s}
.ev-card:hover{border-color:var(--ev-border)}
.ev-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.ev-card-title{font-weight:500;font-size:13px;color:var(--text);flex:1}
.ev-source{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-bottom:4px}
.ev-date{font-size:11px;color:var(--muted-2)}
.empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px}

/* ---- BADGES ---- */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.badge-Memory{background:var(--mem-bg);color:var(--mem-fg);border:1px solid var(--mem-border)}
.badge-Evidence{background:var(--ev-bg);color:var(--ev-fg);border:1px solid var(--ev-border)}
.badge-Outputs{background:var(--out-bg);color:var(--out-fg);border:1px solid var(--out-border)}
.badge-profile{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);font-size:9px}
.badge-onboarding-ok{background:#0d2b0d;color:var(--ok);border:1px solid #1a4d1a;font-size:9px}
.badge-onboarding-pending{background:var(--warn-bg);color:var(--warn-fg);border:1px solid var(--warn-fg);font-size:9px}

/* ---- GRAPH VIEW ---- */
#graph-container{position:absolute;top:0;left:0;right:0;bottom:0;display:none;background:var(--bg);z-index:5;overflow:hidden}
#graph-container.visible{display:block}
#graph-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;cursor:grab}
#graph-canvas.gdrag{cursor:grabbing}

/* graph controls bar — single slim row */
#gc-bar{position:absolute;top:12px;left:12px;right:230px;display:flex;align-items:center;gap:6px;background:rgba(13,17,23,.88);border:1px solid var(--border);border-radius:20px;padding:5px 12px;z-index:10;backdrop-filter:blur(8px)}
#gc-search{background:transparent;border:none;border-right:1px solid var(--border);color:var(--text);font-size:12px;outline:none;padding:2px 10px 2px 2px;width:150px;transition:border-color .15s;margin-right:4px}
#gc-search::placeholder{color:var(--muted-2)}
#gc-search:focus{border-right-color:var(--accent)}
.gc-sep{color:var(--border);padding:0 1px;font-size:10px;user-select:none}
.gc-lbl{color:var(--muted-2);font-size:10px;font-weight:600;letter-spacing:.03em;flex-shrink:0}
.gf-btn{background:transparent;border:1px solid transparent;border-radius:10px;color:var(--muted);cursor:pointer;font-size:10px;font-weight:600;padding:2px 8px;transition:all .12s}
.gf-btn.active{background:rgba(56,139,253,.15);border-color:rgba(56,139,253,.4);color:#79c0ff}
.gf-btn:hover{color:var(--text)}
.gcf-btn{background:transparent;border:1px solid transparent;border-radius:10px;color:var(--muted);cursor:pointer;font-size:10px;padding:2px 8px;transition:all .12s}
.gcf-btn.active{background:rgba(88,166,255,.15);border-color:rgba(88,166,255,.4);color:var(--accent)}

/* graph legend — bottom strip */
#gc-legend{position:absolute;bottom:12px;left:12px;background:rgba(13,17,23,.8);border:1px solid var(--border-2);border-radius:14px;padding:5px 12px;display:flex;gap:12px;align-items:center;z-index:10;backdrop-filter:blur(4px)}
.gl-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);white-space:nowrap}
.gl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid transparent}
.gc-hint{color:var(--muted-2);font-size:10px;font-style:italic}

/* graph info panel */
#gc-info{position:absolute;top:10px;right:10px;width:210px;background:rgba(22,27,34,.97);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;z-index:10;display:none;backdrop-filter:blur(6px)}
#gc-info.visible{display:block}
.gi-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0}
.gi-close:hover{color:var(--text)}
.gi-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:3px}
.gi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;word-break:break-word;padding-right:14px}
.gi-summary{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.gi-cn{font-size:10px;margin-bottom:8px}
.gi-cn.ok{color:var(--ok)}
.gi-cn.nc{color:var(--ev-fg)}
.gi-open{background:var(--accent-muted);border:none;border-radius:var(--radius-sm);color:var(--text);cursor:pointer;display:block;font-size:12px;padding:5px;text-align:center;width:100%;transition:background .15s}
.gi-open:hover{background:var(--accent);color:#000}

/* graph controls / zoom */
#gc-zoom{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:10}
.gcz-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:5px 8px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.gcz-btn:hover{color:var(--text);border-color:var(--accent)}

/* graph empty state */
#gc-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);font-size:14px;pointer-events:none}
</style>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    background: '#161b22',
    primaryColor: '#1f6feb',
    primaryTextColor: '#e6edf3',
    primaryBorderColor: '#30363d',
    lineColor: '#8b949e',
    secondaryColor: '#1c2128',
    tertiaryColor: '#21262d',
    edgeLabelBackground: '#161b22',
    fontFamily: '-apple-system,system-ui,sans-serif',
    fontSize: '13px'
  }
});
window._mermaid = mermaid;
</script>
</head>
<body>
<div id="root">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span class="sidebar-logo-mark">BR</span>bedrock</div>
      <div class="sidebar-project-name">agent-knowledge</div>
      <div class="sidebar-meta" id="sidebar-meta"></div>
    </div>
    <div id="sidebar-tree"></div>
    <div class="sidebar-footer">
      Generated 2026-05-05T20:41:15Z<br>
      Non-canonical derived artifact — vault is the source of truth
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <div id="breadcrumb"><span class="bc-current">Overview</span></div>
      <div id="topbar-tabs">
        <button class="tab-btn active" data-view="overview" onclick="nav('overview')">Overview</button>
        <button class="tab-btn" data-view="evidence" onclick="nav('evidence')">Evidence</button>
        <button class="tab-btn" data-view="graph" onclick="nav('graph')">Graph</button>
      </div>
    </div>
    <div id="view-wrap">
    <div id="content"></div>
    <!-- Graph container: same layer as #content, shown/hidden by toggling display -->
    <div id="graph-container">
      <canvas id="graph-canvas"></canvas>
      <div id="gc-bar">
        <input id="gc-search" type="text" placeholder="Search..." />
        <span class="gc-sep">|</span>
        <span class="gc-lbl">Type</span>
        <button class="gf-btn active" data-type="branch">Branch</button>
        <button class="gf-btn active" data-type="note">Note</button>
        <button class="gf-btn active" data-type="decision">Decision</button>
        <button class="gf-btn active" data-type="evidence">Evidence</button>
        <button class="gf-btn active" data-type="output">Output</button>
        <span class="gc-sep">|</span>
        <button class="gcf-btn active" data-val="all">All</button>
        <button class="gcf-btn" data-val="canonical">Canonical only</button>
      </div>
      <div id="gc-legend">
        <span class="gl-item"><span class="gl-dot" style="background:#0a2447;border-color:#58a6ff"></span>Project</span>
        <span class="gl-item"><span class="gl-dot" style="background:#0d2744;border-color:#388bfd"></span>Branch</span>
        <span class="gl-item"><span class="gl-dot" style="background:#0d1b2e;border-color:#1f6feb"></span>Note</span>
        <span class="gl-item"><span class="gl-dot" style="background:#0b2d0b;border-color:#3fb950"></span>Decision</span>
        <span class="gl-item"><span class="gl-dot" style="background:#1b0042;border-color:#8957e5"></span>Evidence</span>
        <span class="gl-item"><span class="gl-dot" style="background:#2a1500;border-color:#9e6a03"></span>Output</span>
        <span class="gl-item"><span class="gl-dot" style="background:transparent;border-color:#6e40c9"></span>Non-canonical</span>
        <span class="gc-hint">Scroll=zoom · Drag=pan · Click=select</span>
      </div>
      <div id="gc-info">
        <button class="gi-close" onclick="closeInfoPanel()" title="Close">✕</button>
        <div id="gc-info-body"></div>
      </div>
      <div id="gc-zoom">

const DATA = {"schema":"1","generated":"2026-05-05T20:41:15Z","project":{"name":"agent-knowledge","slug":"bedrock","profile":"unknown","onboarding":"complete","vault_path":"/Users/taio/code/agent-knowledge/bedrock","last_updated":"2026-05-05T20:38:30Z"},"warnings":[],"branches":[{"path":"Memory/gotchas.md","title":"⚠️ Gotchas","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"gotchas","is_branch_entry":true,"updated":"2026-05-05","summary":"Known pitfalls, traps, and non-obvious behaviors. - set -euo pipefail + trailing [ \"$DRY_RUN\" -eq 1 ] && log ... causes exit 1 when test is false. Use","purpose":"Known pitfalls, traps, and non-obvious behaviors. - set -euo pipefail + trailing [ \"$DRY_RUN\" -eq 1 ] && log ... causes exit 1 when test is false. Use if/then instead. See conventions. - ship.sh uses ...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>⚠️ Gotchas</h1>\n\n<p>Known pitfalls, traps, and non-obvious behaviors.</p>\n\n<h2>🐚 Shell Scripts</h2>\n\n<ul>\n<li><code>set -euo pipefail</code> + trailing <code>[ &quot;$DRY_RUN&quot; -eq 1 ] &amp;&amp; log ...</code> causes exit 1 when test is false. Use <code>if/then</code> instead. See <a class=\"wikilink\" data-target=\"conventions\">conventions</a>.</li>\n<li><code>ship.sh</code> uses <code>python -m pytest -q</code> not bare <code>pytest</code> -- bare <code>pytest</code> fails outside venvs. See <a class=\"wikilink\" data-target=\"testing\">testing</a>.</li>\n</ul>\n\n<h2>🐍 Python / pip</h2>\n\n<ul>\n<li>macOS system Python refuses <code>pip install</code> (&quot;externally managed&quot;). Use brew python + <code>--user --break-system-packages</code>, or a venv. See <a class=\"wikilink\" data-target=\"stack\">stack</a>.</li>\n<li>Old system pip (e.g. 21.2.4) doesn&#x27;t support PEP 660 editable installs with <code>pyproject.toml</code>. Need pip &gt;= 21.3.</li>\n<li>Venv can get corrupted if multiple Python versions coexist in <code>.venv/lib/</code>. Fix: <code>rm -rf .venv</code> and recreate with explicit version.</li>\n</ul>\n\n<h2>📦 <a class=\"wikilink\" data-target=\"packaging\">Packaging</a></h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"architecture\">hatchling</a> editable installs copy <code>src/</code> files to <code>site-packages</code>. Changes to <code>assets/</code> require rebuild to take effect in the wheel. Source Python files update live.</li>\n<li>pip may silently skip extracting <code>.mdc</code> files from wheels. Workaround: <a class=\"wikilink\" data-target=\"integrations\">inline critical content in Python code</a>. See <a class=\"wikilink\" data-target=\"decisions\">decisions</a>.</li>\n</ul>\n\n<h2>🔄 Sync</h2>\n\n<ul>\n<li><code>stamp_status</code> regex must use <code>[ \\t]<em></code> not <code>\\s</em></code> to avoid eating newlines across YAML frontmatter fields. Fixed in <code>runtime/sync.py</code>.</li>\n</ul>\n\n<h2>🐍 Python Version Compatibility</h2>\n\n<ul>\n<li><strong>f-string backslash (Python &lt; 3.12)</strong>: <code>re.sub(r&#x27;...&#x27;, &#x27;&#x27;, val)</code> cannot be called directly inside an f-string <code>{}</code> on Python 3.10/3.11 — raises <code>SyntaxError: f-string expression part cannot include a backslash</code>. Extract the call to a local variable first. Fixed in <code>runtime/site.py</code> (2026-04-28). Python 3.12+ relaxed this restriction.</li>\n</ul>\n\n<h2>🪟 Windows Encoding</h2>\n\n<ul>\n<li><strong>cp1255 / system locale crash</strong>: On Windows with a non-UTF-8 system locale (e.g. Hebrew cp1255), Python uses the locale encoding for <code>read<em>text()</code> / <code>write</em>text()</code> by default. Every file I/O call across <code>cli.py</code>, <code>sync.py</code>, <code>index.py</code>, <code>capture.py</code>, <code>history.py</code>, <code>integrations.py</code>, <code>refresh.py</code>, <code>absorb.py</code> now explicitly passes <code>encoding=&quot;utf-8&quot;</code>. Fixed in v0.4.4.</li>\n</ul>\n\n<h2>🌐 Site / JS</h2>\n\n<ul>\n<li><strong>Wikilink stem regex</strong> (<code>findNoteBySlug</code> in <code>site.py</code> HTML template): inside a Python raw string, <code>\\\\.md</code> outputs <code>\\\\.md</code> to JS which matches a literal backslash, not a dot. Correct Python raw string: <code>\\.md</code> → JS sees <code>\\.md</code> = literal dot. Fixed in v0.4.3.</li>\n</ul>\n\n<h2>🚀 CI / PyPI</h2>\n\n<ul>\n<li><strong>Trusted publishing broken</strong>: PyPI trusted publisher config does not match the workflow. Publishing is done manually via twine. To fix: remove the trusted publisher on PyPI and re-add it without an environment field. See <a class=\"wikilink\" data-target=\"packaging\">packaging</a>.</li>\n</ul>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: Documented f-string backslash <code>SyntaxError</code> on Python &lt; 3.12; fixed in <code>runtime/site.py</code>.</li>\n<li>2026-05-05: Documented Windows cp1255 encoding crash; fixed in v0.4.4. Documented JS wikilink regex bug; fixed in v0.4.3. Documented PyPI trusted publishing breakage.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"conventions\">conventions</a> -- rules designed to avoid these</li>\n<li><a class=\"wikilink\" data-target=\"testing\">testing</a> -- tests that catch regressions</li>\n<li><a class=\"wikilink\" data-target=\"decisions\">Decisions</a> -- why certain workarounds exist</li>\n</ul>\n"},{"path":"Memory/architecture.md","title":"🏗️ Architecture","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"architecture","is_branch_entry":true,"updated":"2026-04-28","summary":"Core design: path resolution, runtime modules, project config, integrations, knowledge vault model. Two storage modes controlled by vault_mode in .age","purpose":"Core design: path resolution, runtime modules, project config, integrations, knowledge vault model. Two storage modes controlled by vault_mode in .agent-project.yaml: flowchart LR subgraph local[\"loca...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>🏗️ Architecture</h1>\n\n<p>Core design: path resolution, runtime modules, project config, integrations, knowledge vault model.</p>\n\n<h2>⚙️ Runtime Modules (<code>src/agent_knowledge/runtime/</code>)</h2>\n\n<table>\n<tr><th>Module</th><th>Purpose</th></tr>\n<tr><td><code>paths.py</code></td><td>Asset directory resolution (installed vs dev checkout)</td></tr>\n<tr><td><code>shell.py</code></td><td><code>run<em>bash</em>script()</code> / <code>run<em>python</em>script()</code> subprocess wrappers</td></tr>\n<tr><td><code>integrations.py</code></td><td>Multi-tool detection and bridge file installation</td></tr>\n<tr><td><code>sync.py</code></td><td><code>bedrock sync</code> implementation (memory, sessions, git, capture, index)</td></tr>\n<tr><td><code>capture.py</code></td><td>Automatic capture layer (Evidence/captures/ YAML files) + clean-import</td></tr>\n<tr><td><code>index.py</code></td><td>Knowledge index generation (knowledge-index.json/md) + search</td></tr>\n<tr><td><code>site.py</code></td><td>Static HTML site export with interactive graph view</td></tr>\n<tr><td><code>refresh.py</code></td><td>System refresh: updates integration files to current framework version</td></tr>\n<tr><td><code>history.py</code></td><td>Lightweight history layer (History/events.ndjson, history.md, timeline/)</td></tr>\n</table>\n\n<h2>🗄️ Knowledge Vault Model</h2>\n\n<p>Two storage modes controlled by <code>vault_mode</code> in <code>.agent-project.yaml</code>:</p>\n\n<div class=\"mermaid\">flowchart LR\n    subgraph local[\"local mode (default)\"]\n        direction TB\n        L1[\"./bedrock\\n(real dir, git-tracked)\"] -->|symlink| L2[\"~/agent-os/projects/slug/\"]\n    end\n    subgraph external[\"external mode\"]\n        direction TB\n        E1[\"./bedrock\\n(symlink)\"] -->|points to| E2[\"~/agent-os/projects/slug/\\n(source of truth)\"]\n    end\n    init[\"bedrock init\"] -->|default| local\n    init -->|--external| external</div>\n\n<p><code>bedrock init</code> defaults to local mode. Use <code>--external</code> for external mode, or <code>bedrock migrate-to-local</code> to convert an existing external project.</p>\n<p>In local mode, <code>.gitignore</code> auto-patched to exclude <code>Evidence/raw/</code>, <code>Sessions/</code>, <code>Outputs/site/</code>, etc.</p>\n\n<p>Vault structure (same in both modes):</p>\n\n<div class=\"mermaid\">flowchart TD\n    V[\"bedrock/\"]\n    V --> M[\"Memory/\\n✅ canonical, curated, durable\"]\n    V --> E[\"Evidence/\\n⚠️ raw imports, captures\"]\n    V --> O[\"Outputs/\\n🔧 generated — never canonical\"]\n    V --> H[\"History/\\n📖 lightweight diary\"]</div>\n\n<h2>📂 Path Resolution</h2>\n\n<ul>\n<li><code>runtime/paths.py</code> → <code>get<em>assets</em>dir()</code> with dual-mode:</li>\n</ul>\n<p>  1. Installed: <code>assets/</code> sibling of <code>runtime/</code> in site-packages</p>\n<p>  2. Dev: <code>repo_root/assets/</code> (4 parents up from <code>paths.py</code>)</p>\n<ul>\n<li>Marker file for validation: <code>scripts/lib/knowledge-common.sh</code></li>\n<li>Result cached in <code><em>cached</em>assets_dir</code> for the process lifetime</li>\n</ul>\n\n<h2>🗂️ Asset Layout</h2>\n\n<p>All non-Python assets under <code>assets/</code>:</p>\n<ul>\n<li><code>assets/scripts/</code> — bundled bash scripts</li>\n<li><code>assets/templates/</code> — project, memory, integrations, portfolio templates</li>\n<li><code>assets/rules/</code> — project-level Cursor rules</li>\n<li><code>assets/rules-global/</code> — global Cursor rules</li>\n<li><code>assets/commands/</code> — agent command docs (system-update, ship, etc.)</li>\n<li><code>assets/skills/</code> — composable skill files for agent use</li>\n<li><code>assets/skills-cursor/</code> — Cursor-specific skills</li>\n<li><code>assets/claude/</code> — Claude Code integration files</li>\n</ul>\n\n<h2>🌐 Site Generation Pipeline</h2>\n\n<div class=\"mermaid\">flowchart LR\n    Vault[\"Vault\\nMemory/ Evidence/ History/\"] --> KJ[\"knowledge.json\\n(normalized notes)\"]\n    KJ --> GJ[\"graph.json\\n(nodes + edges)\"]\n    GJ --> HTML[\"index.html\\n(single-page app)\"]\n    HTML --> V1[\"Overview\"]\n    HTML --> V2[\"Note detail\"]\n    HTML --> V3[\"Evidence\"]\n    HTML --> V4[\"Graph\\n(force-directed)\"]</div>\n\n<p>Wikilink edges: <code>build<em>graph</em>data()</code> extracts <code><a class=\"wikilink\" data-target=\"wikilinks\">wikilinks</a></code> from each note&#x27;s rendered HTML and adds blue <code>related_to</code> edges between nodes, giving the graph semantic cross-connections beyond the folder hierarchy.</p>\n\n<p><code><em>md</em>to_html()</code> supports: headings (with inline wikilinks), paragraphs, bullet/ordered lists, blockquotes, fenced code blocks, horizontal rules, and <code>|pipe|</code> markdown tables rendered as <code>&lt;table&gt;</code> elements.</p>\n\n<h2>📅 History Layer</h2>\n\n<ul>\n<li><code>History/events.ndjson</code> — append-only machine-readable log</li>\n<li><code>History/history.md</code> — human-readable entrypoint (&lt; 150 lines)</li>\n<li><code>History/timeline/</code> — sparse milestone notes (init, backfill, releases only)</li>\n<li>Dedup: releases once-per-tag, backfill once-per-month, project_start once-ever</li>\n<li>Auto-created by <code>init</code>, refreshable with <code>backfill-history</code></li>\n</ul>\n\n<h2>⚙️ Project Config (<code>.agent-project.yaml</code>)</h2>\n\n<ul>\n<li>Version 4, <code>ontology<em>model: 2</code>, <code>framework</em>version</code> field</li>\n<li><code>knowledge.vault_mode: local|external</code> — set by <code>init --local</code> or <code>migrate-to-local</code></li>\n<li><code>onboarding: status: pending|complete</code> in STATUS.md</li>\n<li>No <code>root_index</code> — entry points are STATUS.md + Memory/MEMORY.md</li>\n<li>Hooks reference <code>bedrock update --project .</code></li>\n</ul>\n\n<h2>🔁 System Refresh (<code>runtime/refresh.py</code>)</h2>\n\n<ul>\n<li>Compares <code>framework_version</code> in STATUS.md to <code><strong>version</strong></code></li>\n<li>Refreshes: <code>AGENTS.md</code>, <code>.cursor/hooks.json</code>, <code>.cursor/rules/agent-knowledge.mdc</code>, <code>CLAUDE.md</code>, <code>.codex/AGENTS.md</code>, <code>STATUS.md</code>, <code>.agent-project.yaml</code></li>\n<li>Idempotent: skips files already at current version</li>\n<li><code>is_stale()</code> used by <code>doctor</code> command for staleness warning</li>\n</ul>\n\n<h2>📸 Capture Layer</h2>\n\n<ul>\n<li><code>Evidence/captures/</code> — YAML event files (timestamp, source<em>tool, event</em>type, touched_branches)</li>\n<li>Idempotent within same UTC minute</li>\n<li>Sources: sync, init, refresh, graph sync, import, ship</li>\n</ul>\n\n<h2>🔍 Knowledge Index</h2>\n\n<ul>\n<li><code>Outputs/knowledge-index.json</code> — structured catalog for programmatic retrieval</li>\n<li><code>Outputs/knowledge-index.md</code> — human-readable version</li>\n<li>Search: Memory-first, Evidence/Outputs clearly marked non-canonical</li>\n<li>Used by <code>bedrock search &lt;query&gt;</code></li>\n</ul>\n\n<h2>⚠️ Gotchas</h2>\n\n<ul>\n<li><code>set -euo pipefail</code> + trailing <code>[</code> test returning false causes exit 1 — fixed with explicit <code>if</code></li>\n<li><code>ship.sh</code> must use <code>python -m pytest -q</code> not bare <code>pytest</code></li>\n<li>Canvas 2D rendering: reading <code>clientWidth</code>/<code>clientHeight</code> after <code>display:none→block</code> must be deferred with <code>requestAnimationFrame</code> (graph fix, 2026-04-11)</li>\n<li>Evidence/Outputs are non-canonical and must not be auto-promoted to Memory/</li>\n</ul>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: Local vault mode is now the default (<code>init</code> no longer needs <code>--local</code>; use <code>--external</code> to opt out).</li>\n<li>2026-04-28: <code>site.py</code> table rendering fixed — markdown tables now render as proper HTML <code>&lt;table&gt;</code> elements.</li>\n<li>2026-04-28: Graph wikilink edges added — <code>build<em>graph</em>data()</code> extracts <code><a class=\"wikilink\" data-target=\"wikilinks\">wikilinks</a></code> and creates blue <code>related_to</code> edges.</li>\n<li>2026-04-28: Graph node selection dims unrelated nodes and keeps neighbors semi-visible with labels.</li>\n<li>2026-04-28: Graph layout spread tuned — <code>SIM<em>REPULSION 18000</code>, <code>SIM</em>REST 220</code>, <code>SIM_GRAVITY 0.008</code> for a readable layout.</li>\n<li>2026-04-28: Staleness detection added to <code>doctor</code> via <code>check<em>stale</em>notes()</code> in <code>refresh.py</code>.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"stack\">stack</a> — languages, runtimes, and dependencies</li>\n<li><a class=\"wikilink\" data-target=\"conventions\">conventions</a> — coding and design conventions</li>\n<li><a class=\"wikilink\" data-target=\"packaging\">packaging</a> — how the package is built and distributed</li>\n</ul>\n"},{"path":"Memory/history-layer.md","title":"📅 History Layer","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"history-layer","is_branch_entry":true,"updated":"2026-04-28","summary":"Lightweight project diary. Records what happened over time without becoming a second knowledge base. History/ events.ndjson    -- append-only machine-","purpose":"Lightweight project diary. Records what happened over time without becoming a second knowledge base. History/ events.ndjson    -- append-only machine-readable event log (NDJSON) history.md       -- hu...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>📅 History Layer</h1>\n\n<p>Lightweight project diary. Records what happened over time without becoming a second knowledge base.</p>\n\n<h2>🗂️ Structure</h2>\n\n<pre><code>\nHistory/\n  events.ndjson    -- append-only machine-readable event log (NDJSON)\n  history.md       -- human-readable entrypoint (&lt; 150 lines, auto-generated)\n  timeline/        -- sparse milestone notes (init, backfill, releases only)\n</code></pre>\n\n<h2>🔀 Memory vs History</h2>\n\n<table>\n<tr><th>Layer</th><th>Role</th></tr>\n<tr><td><code>Memory/</code></td><td>What is true now (curated, authoritative)</td></tr>\n<tr><td><code>History/</code></td><td>What happened over time (lightweight diary)</td></tr>\n<tr><td><code>Evidence/</code></td><td>Imported/extracted material (non-canonical)</td></tr>\n<tr><td><code>Outputs/</code></td><td>Generated helper artifacts</td></tr>\n<tr><td><code>Sessions/</code></td><td>Temporary working state</td></tr>\n</table>\n\n<p>History is <strong>not</strong> a git replacement, not a full transcript store, not a second source of truth.</p>\n\n<h2>📋 Event Types</h2>\n\n<ul>\n<li><code>project_start</code> — first git commit date + total commits (once ever)</li>\n<li><code>release</code> — one event per git tag (deduplicated by tag name)</li>\n<li><code>integration_cursor/claude/codex</code> — detected tool integration (once per month)</li>\n<li><code>backfill</code> — summary of the backfill run (once per month)</li>\n</ul>\n\n<h2>🔁 Deduplication</h2>\n\n<ul>\n<li><code>project_start</code>: once ever</li>\n<li><code>release</code>: once per tag name</li>\n<li><code>backfill</code>, <code>integration_*</code>: once per calendar month</li>\n<li>Safe to re-run: idempotent by design</li>\n</ul>\n\n<h2>🛠️ Commands</h2>\n\n<ul>\n<li><code>bedrock init</code> — auto-backfills history after setup</li>\n<li><code>bedrock backfill-history</code> — manual refresh, supports <code>--dry-run</code>, <code>--json</code>, <code>--force</code></li>\n<li><code>bedrock doctor</code> — warns if <code>History/</code> is missing</li>\n</ul>\n\n<h2>⚙️ Implementation</h2>\n\n<ul>\n<li><code>src/agent_knowledge/runtime/history.py</code></li>\n<li>Functions: <code>run<em>backfill()</code>, <code>init</em>history()</code>, <code>append<em>event()</code>, <code>log</em>event()</code>, <code>read<em>events()</code>, <code>history</em>exists()</code></li>\n<li>Git helpers: subprocess calls to <code>git log</code>, <code>git tag</code>, <code>git rev-list</code></li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- runtime module layout</li>\n<li><a class=\"wikilink\" data-target=\"cli\">cli</a> -- backfill-history and doctor commands</li>\n</ul>\n"},{"path":"Memory/conventions.md","title":"📐 Conventions","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"conventions","is_branch_entry":true,"updated":"2026-04-28","summary":"Coding patterns, naming, and design rules. - CLI command names use hyphens: bedrock graphify-sync - Python package uses underscores: agent_knowledge -","purpose":"Coding patterns, naming, and design rules. - CLI command names use hyphens: bedrock graphify-sync - Python package uses underscores: agent_knowledge - User-facing messages reference CLI commands, neve...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>📐 Conventions</h1>\n\n<p>Coding patterns, naming, and design rules.</p>\n\n<h2>🏷️ Naming</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"cli\">CLI</a> command names use <strong>hyphens</strong>: <code>bedrock graphify-sync</code></li>\n<li>Python package uses <strong>underscores</strong>: <code>agent_knowledge</code></li>\n<li>User-facing messages reference CLI commands, never script paths</li>\n</ul>\n\n<h2>🧩 Code Patterns</h2>\n\n<ul>\n<li>Shell scripts stay in <code>assets/scripts/</code>, invoked via <code>runtime/shell.py</code></li>\n<li>Templates use <code>&lt;placeholder&gt;</code> syntax for substitution</li>\n<li>No emojis in code, logs, or CLI output</li>\n</ul>\n\n<h2>📝 Memory Notes</h2>\n\n<ul>\n<li>Require YAML frontmatter: <code>note_type</code>, <code>area</code>/<code>project</code>, <code>updated</code>, <code>tags</code></li>\n<li><code>durable-branch</code> notes must include an <code>update_when</code> field in frontmatter: a plain-English description of the conditions that should trigger an update to that note. This tells agents when to revisit without requiring them to understand the whole codebase.</li>\n<li><code>doctor</code> automatically detects potentially stale notes by comparing the note&#x27;s <code>updated</code> date against <code>git log</code> on the source paths registered for that area in <code>refresh.<em>NOTE</em>AREA_PATHS</code>. When adding a new durable-branch area, add a corresponding entry there.</li>\n<li>Use wiki-links (<code><a class=\"wikilink\" data-target=\"note-name\">note-name</a></code>) for Obsidian graph connectivity — they become edges in the graph view</li>\n<li>Use emojis in section headers for scannability (e.g. <code>## 🔄 Recent Changes</code>, <code>## 🔗 See Also</code>)</li>\n<li><a class=\"wikilink\" data-target=\"MEMORY\">Evidence and Outputs</a> are never treated as curated truth</li>\n</ul>\n\n<h2>🐚 Shell Scripts</h2>\n\n<ul>\n<li>Always <code>set -euo pipefail</code></li>\n<li>Avoid <code>[ test ] &amp;&amp; cmd</code> -- use <code>if/then</code> (see <a class=\"wikilink\" data-target=\"gotchas\">gotchas</a>)</li>\n<li>Find assets via <code>SCRIPT_DIR</code>, never hardcode paths</li>\n</ul>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: Added <code>update_when</code> convention for all <code>durable-branch</code> notes; <code>doctor</code> uses it to detect stale notes.</li>\n<li>2026-04-28: Documented that each area in <code>refresh.<em>NOTE</em>AREA_PATHS</code> must have a matching durable-branch entry.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- how patterns are applied</li>\n<li><a class=\"wikilink\" data-target=\"gotchas\">gotchas</a> -- things that break these conventions</li>\n<li><a class=\"wikilink\" data-target=\"cli\">cli</a> -- CLI naming examples</li>\n</ul>\n"},{"path":"Memory/stack.md","title":"📚 Stack","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"stack","is_branch_entry":true,"updated":"2026-04-28","summary":"Languages, runtimes, frameworks, and tooling used by agent-knowledge. - Python 3.9+ -- package code, CLI, tests - Bash -- bundled scripts in assets/sc","purpose":"Languages, runtimes, frameworks, and tooling used by agent-knowledge. - Python 3.9+ -- package code, CLI, tests - Bash -- bundled scripts in assets/scripts/ (see architecture) - hatchling via pyprojec...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>📚 Stack</h1>\n\n<p>Languages, runtimes, frameworks, and tooling used by agent-knowledge.</p>\n\n<h2>🖥️ Languages &amp; Runtimes</h2>\n\n<ul>\n<li><strong>Python 3.9+</strong> -- package code, <a class=\"wikilink\" data-target=\"cli\">CLI</a>, <a class=\"wikilink\" data-target=\"testing\">tests</a></li>\n<li><strong>Bash</strong> -- bundled scripts in <code>assets/scripts/</code> (see <a class=\"wikilink\" data-target=\"architecture\">architecture</a>)</li>\n</ul>\n\n<h2>📦 Build &amp; Packaging</h2>\n\n<ul>\n<li><strong><a class=\"wikilink\" data-target=\"packaging\">hatchling</a></strong> via <code>pyproject.toml</code>, src-layout at <code>src/agent_knowledge/</code></li>\n<li>Wheel includes all non-Python assets via <code>force-include</code></li>\n</ul>\n\n<h2>🧩 Dependencies</h2>\n\n<ul>\n<li><strong>click &gt;= 8.0</strong> -- <a class=\"wikilink\" data-target=\"cli\">CLI framework</a></li>\n<li><strong>tiktoken</strong> (optional) -- token measurement</li>\n<li><strong>pytest &gt;= 7.0</strong> (dev) -- <a class=\"wikilink\" data-target=\"testing\">testing</a></li>\n<li><strong>python-build</strong> (dev) -- wheel/sdist building</li>\n</ul>\n\n<h2>🔁 CI/CD</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"deployments\">GitHub Actions</a> -- Python 3.10, 3.12, 3.13 on Ubuntu + macOS</li>\n</ul>\n\n<h2>🚫 What This Is Not</h2>\n\n<ul>\n<li>No frontend, no database, no API server, no Docker</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"packaging\">packaging</a> -- how the package is built and distributed</li>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- how the code is structured</li>\n<li><a class=\"wikilink\" data-target=\"deployments\">deployments</a> -- CI pipeline details</li>\n</ul>\n"},{"path":"Memory/packaging.md","title":"📦 Packaging","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"packaging","is_branch_entry":true,"updated":"2026-04-30","summary":"Python packaging strategy for making bedrock pip-installable. - Backend: hatchling via pyproject.toml - Layout: src-layout at src/agentknowledge/ - En","purpose":"Python packaging strategy for making bedrock pip-installable. - Backend: hatchling via pyproject.toml - Layout: src-layout at src/agent_knowledge/ - Entry points: bedrock = agent_knowledge.cli:main, a...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>📦 Packaging</h1>\n\n<p>Python <a class=\"wikilink\" data-target=\"stack\">packaging</a> strategy for making bedrock pip-installable.</p>\n\n<h2>⚙️ Build System</h2>\n\n<ul>\n<li>Backend: <strong>hatchling</strong> via <code>pyproject.toml</code></li>\n<li>Layout: src-layout at <code>src/agent_knowledge/</code></li>\n<li>Entry points: <code>bedrock = agent<em>knowledge.cli:main</code>, <code>agent-knowledge = agent</em>knowledge.cli:main</code> (deprecated alias)</li>\n</ul>\n\n<h2>🗂️ Asset Bundling</h2>\n\n<p>All non-Python assets consolidated under <code>assets/</code> at repo root. Bundled into wheel via <code>[tool.hatch.build.targets.wheel.force-include]</code>:</p>\n<ul>\n<li><code>assets/scripts</code> -&gt; <code>agent_knowledge/assets/scripts</code></li>\n<li><code>assets/templates</code> -&gt; <code>agent_knowledge/assets/templates</code></li>\n<li><code>assets/rules</code> -&gt; <code>agent_knowledge/assets/rules</code></li>\n<li>(and rules-global, commands, skills, skills-cursor, claude)</li>\n</ul>\n\n<p>See <a class=\"wikilink\" data-target=\"architecture\">architecture</a> for how the code finds these at runtime.</p>\n\n<h2>🏷️ Version</h2>\n\n<p>Current: <strong>0.4.7</strong> (tagged <code>v0.4.7</code>). PyPI package name: <code>project-bedrock</code>. See <a class=\"wikilink\" data-target=\"deployments\">deployments</a>.</p>\n\n<p>Install: <code>pip install project-bedrock</code> or <code>pipx install project-bedrock</code>. Command: <code>bedrock</code>.</p>\n\n<p><strong>Breaking change in 0.4.0</strong>: vault folder renamed from <code>./agent-knowledge/</code> to <code>./bedrock/</code>. Existing users run <code>bedrock migrate-vault</code> then <code>bedrock refresh-system</code>.</p>\n\n<h2>🚀 PyPI Publish</h2>\n\n<p>CI trusted publishing (OIDC) is currently broken — the PyPI trusted publisher config doesn&#x27;t match the workflow. Publishing is done locally via twine from a temp venv:</p>\n<pre><code class=\"language-bash\">\npython3 -m venv /tmp/build-venv &amp;&amp; /tmp/build-venv/bin/pip install build twine\n/tmp/build-venv/bin/python -m build &amp;&amp; /tmp/build-venv/bin/twine upload dist/*\n</code></pre>\n<p>Fix: go to PyPI project settings → Publishing → update trusted publisher to match <code>publish.yml</code> (no environment field).</p>\n\n<h2>🧩 Dependencies</h2>\n\n<p>See <a class=\"wikilink\" data-target=\"stack\">stack</a> for the full list.</p>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: Bumped to v0.2.9; <code>docs/</code> folder added to repo for GitHub/PyPI display assets (GIF, examples) — not included in wheel.</li>\n<li>2026-04-28: Bumped to v0.3.0 — see deployments for full changelog.</li>\n<li>2026-04-28: PyPI package renamed from <code>agent-knowledge-cli</code> to <code>project-bedrock</code> (v0.3.0).</li>\n<li>2026-04-28: CLI primary command renamed from <code>agent-knowledge</code> to <code>bedrock</code>; <code>agent-knowledge</code> kept as deprecated alias (v0.3.1).</li>\n<li>2026-04-28: <code>migrate-from-legacy</code> command added to help existing users migrate (v0.3.2). <code>pipx install project-bedrock</code> recommended for global install.</li>\n<li>2026-04-29: v0.4.0 — vault folder renamed <code>agent-knowledge/</code> → <code>bedrock/</code> everywhere. <code>migrate-vault</code> command added for existing users. Windows compatibility fixes (bash detection, JSON paths, UTF-8 git output).</li>\n<li>2026-04-30: v0.4.1 — <code>completion</code>, <code>upgrade</code>, <code>/compact-context</code> commands added. Specialist commands hidden from <code>--help</code>. CI tests fixed for v0.4.0 rename.</li>\n<li>2026-05-05: v0.4.3 — wikilink JS regex fix (<code>\\\\.md</code> → <code>\\.md</code>); README agent-first install flow.</li>\n<li>2026-05-05: v0.4.4 — <code>encoding=&quot;utf-8&quot;</code> added to all <code>read<em>text()</code>/<code>write</em>text()</code> calls across 8 modules (fixes Windows cp1255 crash).</li>\n<li>2026-05-05: v0.4.5 — <code>.codex/AGENTS.md</code> template rewritten to be fully self-contained (no longer defers to root AGENTS.md).</li>\n<li>2026-05-05: v0.4.6 — <code>install-global</code> command added; writes to <code>~/.cursor/rules/</code>, <code>~/.claude/CLAUDE.md</code>, <code>~/.codex/AGENTS.md</code>.</li>\n<li>2026-05-05: v0.4.7 — Gemini CLI + Antigravity support; <code>GEMINI.md</code> template; <code>~/.gemini/GEMINI.md</code> in <code>install-global</code>.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"stack\">stack</a> -- runtimes and frameworks</li>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- package layout</li>\n<li><a class=\"wikilink\" data-target=\"gotchas\">gotchas</a> -- pip installation pitfalls</li>\n<li><a class=\"wikilink\" data-target=\"decisions\">Decision: hatchling over setuptools</a></li>\n</ul>\n"},{"path":"Memory/integrations.md","title":"🔌 Integrations","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"integrations","is_branch_entry":true,"updated":"2026-05-05","summary":"Multi-tool detection and bridge file installation for Cursor, Claude, Codex, Gemini CLI, and Antigravity. Called by init via detect() then install_all","purpose":"Multi-tool detection and bridge file installation for Cursor, Claude, Codex, Gemini CLI, and Antigravity. Called by init via detect() then install_all(). - .cursor/hooks.json -- 4 hooks: post-write, s...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>🔌 Integrations</h1>\n\n<p>Multi-tool detection and bridge file installation for Cursor, Claude, Codex, Gemini CLI, and Antigravity.</p>\n\n<h2>🔍 Detection (<code>runtime/integrations.py</code>)</h2>\n\n<table>\n<tr><th>Tool</th><th>Detection</th><th>Always installed?</th></tr>\n<tr><td>Cursor</td><td><code>.cursor/</code> exists</td><td>Yes</td></tr>\n<tr><td>Claude</td><td><code>.claude/</code> exists OR <code>CLAUDE.md</code> exists</td><td>Yes</td></tr>\n<tr><td>Codex</td><td><code>.codex/</code> exists</td><td>Only if detected</td></tr>\n<tr><td>Gemini CLI / Antigravity</td><td><code>.gemini/</code> exists OR <code>GEMINI.md</code> exists</td><td>Only if detected</td></tr>\n</table>\n\n<p>Called by <a class=\"wikilink\" data-target=\"cli\">init</a> via <code>detect()</code> then <code>install_all()</code>.</p>\n\n<h2>🌉 Bridge Files</h2>\n\n<h3>Cursor (first-class)</h3>\n<ul>\n<li><code>.cursor/hooks.json</code> -- 4 hooks: <code>post-write</code>, <code>session-start</code>, <code>stop</code>, <code>preCompact</code></li>\n<li><code>.cursor/rules/bedrock.mdc</code> -- <code>alwaysApply</code> rule (was <code>agent-knowledge.mdc</code>; auto-renamed by <code>refresh-system</code>)</li>\n<li><code>.cursor/commands/memory-update.md</code>, <code>system-update.md</code>, <code>absorb.md</code>, <code>compact-context.md</code></li>\n</ul>\n\n<h3>Claude Code (first-class)</h3>\n<ul>\n<li><code>.claude/settings.json</code> -- hooks: SessionStart, Stop, PreCompact</li>\n<li><code>.claude/CLAUDE.md</code> -- runtime contract</li>\n<li><code>.claude/commands/memory-update.md</code>, <code>system-update.md</code>, <code>absorb.md</code>, <code>compact-context.md</code></li>\n</ul>\n\n<h3>Codex</h3>\n<ul>\n<li><code>.codex/AGENTS.md</code> -- fully self-contained (v0.4.5+): includes onboarding, memory-update procedure, compact-context, knowledge structure. No longer defers to root AGENTS.md.</li>\n</ul>\n\n<h3>Gemini CLI / Antigravity (v0.4.7+)</h3>\n<ul>\n<li><code>GEMINI.md</code> at project root — memory contract for Gemini CLI and Antigravity IDE</li>\n<li>Both tools share <code>~/.gemini/GEMINI.md</code> as global config (<code>install-global</code> writes there)</li>\n<li>Antigravity also reads <code>AGENTS.md</code> (already covered by root AGENTS.md)</li>\n</ul>\n\n<h2>🌐 Global Install (<code>bedrock install-global</code>)</h2>\n\n<p>New in v0.4.6. Writes conditional rules to user-global config dirs so bedrock activates in any project with a <code>./bedrock/</code> vault — no per-project setup needed.</p>\n\n<table>\n<tr><th>Target</th><th>Tool</th></tr>\n<tr><td><code>~/.cursor/rules/bedrock-global.mdc</code></td><td>Cursor</td></tr>\n<tr><td><code>~/.claude/CLAUDE.md</code> (appended)</td><td>Claude Code</td></tr>\n<tr><td><code>~/.codex/AGENTS.md</code> (appended)</td><td>Codex</td></tr>\n<tr><td><code>~/.gemini/GEMINI.md</code> (appended)</td><td>Gemini CLI + Antigravity</td></tr>\n</table>\n\n<p>All writes are sentinel-guarded (idempotent). <code>--uninstall</code> removes them. <code>--dry-run</code> previews.</p>\n\n<h2>🤝 Onboarding Handoff</h2>\n\n<div class=\"mermaid\">flowchart TD\n    A[\"Agent session starts\"] --> B{\"STATUS.md\\nonboarding:?\"}\n    B -->|pending| C[\"Read AGENTS.md\\nfirst-time setup\"]\n    B -->|complete| D[\"Read Memory/MEMORY.md\\nfor context\"]\n    C --> E[\"Run bedrock init\"]\n    E --> D</div>\n\n<p>No manual <code>next-prompt</code> command needed.</p>\n\n<h2>🪟 Windows Support (v0.4.0+)</h2>\n\n<p>Windows is fully supported as of v0.4.0:</p>\n<ul>\n<li><code>shell.py</code>: auto-detects Git Bash (<code>git-for-Windows</code>) on PATH and known install paths</li>\n<li><code>integrations.py</code>, <code>refresh.py</code>: forward-slash paths in all generated JSON (backslash fix)</li>\n<li><code>sync.py</code>, <code>history.py</code>, <code>refresh.py</code>: <code>encoding=&quot;utf-8&quot;</code> on all git subprocess calls</li>\n<li><code>bootstrap-memory-tree.sh</code>: symlink check skipped on Windows / local vault mode</li>\n</ul>\n\n<p>Not in CI matrix (ubuntu + macos only), but core functionality is covered by these targeted fixes.</p>\n\n<h2>⚠️ PATH Conflict Gotcha</h2>\n\n<p>Multiple tools can install an <code>agent-knowledge</code> binary. Graphify (Node.js) installs one at <code>~/.nvm/versions/node/&lt;version&gt;/bin/agent-knowledge</code> which may shadow our Python CLI. Fix: add Python bin to PATH before nvm — <code>export PATH=&quot;/Users/taio/Library/Python/3.13/bin:$PATH&quot;</code>. Or invoke directly: <code>python3 -m agent_knowledge</code>.</p>\n\n<h2>📌 Key Decision</h2>\n\n<p>Cursor rule content is <strong>inlined as <code><em>CURSOR</em>RULE</code></strong> in <code>integrations.py</code> AND stored at <code>assets/templates/integrations/cursor/bedrock.mdc</code>. <code>refresh.py</code> prefers the file; falls back to the constant. See <a class=\"wikilink\" data-target=\"decisions\">decisions</a>.</p>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-29: Cursor rule renamed <code>agent-knowledge.mdc</code> → <code>bedrock.mdc</code>. <code>refresh-system</code> auto-migrates existing installs. All bridge file path references updated to <code>./bedrock/</code>. <code>repo<em>abs</code> now uses <code>.as</em>posix()</code> to generate forward-slash paths (Windows JSON fix).</li>\n<li>2026-05-05: v0.4.5 — <code>.codex/AGENTS.md</code> rewritten to be fully self-contained; removed dependency on root AGENTS.md.</li>\n<li>2026-05-05: v0.4.6 — <code>install-global</code> command added; installs conditional rules in <code>~/.cursor/</code>, <code>~/.claude/</code>, <code>~/.codex/</code>.</li>\n<li>2026-05-05: v0.4.7 — Gemini CLI + Antigravity added; <code>GEMINI.md</code> template; detection via <code>.gemini/</code> or <code>GEMINI.md</code>; <code>install-global</code> writes <code>~/.gemini/GEMINI.md</code>.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"cli\">init command</a> -- orchestrates detection and install</li>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- design overview</li>\n<li><a class=\"wikilink\" data-target=\"testing\">testing</a> -- integration test coverage</li>\n</ul>\n"},{"path":"Memory/deployments.md","title":"🚀 Deployments","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"deployments","is_branch_entry":true,"updated":"2026-04-28","summary":"Release, CI, and distribution strategy. 0.3.2 (tagged v0.3.2). See packaging. GitHub Actions (.github/workflows/ci.yml): - Triggered on push/PR to mai","purpose":"Release, CI, and distribution strategy. 0.3.2 (tagged v0.3.2). See packaging. GitHub Actions (.github/workflows/ci.yml): - Triggered on push/PR to main - Matrix: ubuntu-latest + macos-latest, Python 3...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>🚀 Deployments</h1>\n\n<p>Release, CI, and distribution strategy.</p>\n\n<h2>🏷️ Version</h2>\n\n<p><strong>0.3.2</strong> (tagged <code>v0.3.2</code>). See <a class=\"wikilink\" data-target=\"packaging\">packaging</a>.</p>\n\n<h2>🔁 CI Pipeline</h2>\n\n<p><a class=\"wikilink\" data-target=\"testing\">GitHub Actions</a> (<code>.github/workflows/ci.yml</code>):</p>\n<ul>\n<li>Triggered on push/PR to <code>main</code></li>\n<li>Matrix: <code>ubuntu-latest</code> + <code>macos-latest</code>, Python 3.10/3.12/3.13</li>\n<li><strong>test</strong> job: pytest with editable install</li>\n<li><strong>build</strong> job: wheel build + installed <a class=\"wikilink\" data-target=\"cli\">CLI</a> smoke test</li>\n</ul>\n\n<h2>📦 Distribution</h2>\n\n<ul>\n<li><code>pip install project-bedrock</code> (published to PyPI)</li>\n<li>Build: <code>python -m build</code> produces wheel and sdist</li>\n<li>Local dev: <code>pip install -e &quot;.[dev]&quot;</code> inside a venv (see <a class=\"wikilink\" data-target=\"gotchas\">gotchas</a>)</li>\n</ul>\n\n<h2>🚫 No Server Components</h2>\n\n<p>No Docker, no container deployment, no API server. See <a class=\"wikilink\" data-target=\"stack\">stack</a>.</p>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: Released v0.3.0 — table rendering, graph neighbor highlight, local-mode default, staleness detection, absorb command, graph spread tuning.</li>\n<li>2026-04-28: Released v0.3.1 — CLI renamed to <code>bedrock</code>; PyPI package renamed to <code>project-bedrock</code>; <code>agent-knowledge</code> kept as deprecated alias.</li>\n<li>2026-04-28: Released v0.3.2 — <code>migrate-from-legacy</code> command; migration guide in docs/reference.md; cover image and demo GIF in README.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"packaging\">packaging</a> -- build system details</li>\n<li><a class=\"wikilink\" data-target=\"testing\">testing</a> -- what CI runs</li>\n<li><a class=\"wikilink\" data-target=\"stack\">stack</a> -- runtime requirements</li>\n</ul>\n"},{"path":"Memory/cli.md","title":"🛠️ CLI","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"cli","is_branch_entry":true,"updated":"2026-05-05","summary":"Design and implementation of the bedrock command-line interface. Built on click >= 8.0 with a @click.group() top-level. - Infers slug from directory n","purpose":"Design and implementation of the bedrock command-line interface. Built on click >= 8.0 with a @click.group() top-level. - Infers slug from directory name, detects integrations automatically - Default ...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>🛠️ CLI</h1>\n\n<p>Design and implementation of the <code>bedrock</code> command-line interface.</p>\n\n<h2>⚙️ Framework</h2>\n\n<p>Built on <a class=\"wikilink\" data-target=\"stack\">click &amp;gt;= 8.0</a> with a <code>@click.group()</code> top-level.</p>\n\n<h2>📋 Subcommands (28)</h2>\n\n<table>\n<tr><th>Command</th><th>Description</th><th>Delegates to</th></tr>\n<tr><td><code>init</code></td><td>Zero-arg project setup + history backfill. Local (in-repo) by default; <code>--external</code> for external vault</td><td><code>install-project-links.sh</code> + integrations + history.py</td></tr>\n<tr><td><code>migrate-vault</code></td><td>Rename <code>./agent-knowledge/</code> → <code>./bedrock/</code> for projects before v0.4</td><td>pure Python</td></tr>\n<tr><td><code>migrate-to-local</code></td><td>Convert existing external-vault project: copy vault, swap pointer, patch .gitignore</td><td>pure Python</td></tr>\n<tr><td><code>sync</code></td><td>Memory sync, git evidence extraction, update STATUS.md</td><td><code>runtime/sync.py</code></td></tr>\n<tr><td><code>setup</code></td><td>Global Cursor rules/skills install</td><td>pure Python</td></tr>\n<tr><td><code>bootstrap</code></td><td>Repair memory tree</td><td><code>bootstrap-memory-tree.sh</code></td></tr>\n<tr><td><code>import</code></td><td>Import repo evidence</td><td><code>import-agent-history.sh</code></td></tr>\n<tr><td><code>update</code></td><td>Sync project changes</td><td><code>update-knowledge.sh</code></td></tr>\n<tr><td><code>doctor</code></td><td>Validate setup, staleness warnings</td><td><code>doctor.sh</code> + Python pre-checks</td></tr>\n<tr><td><code>validate</code></td><td>Validate knowledge layout</td><td><code>validate-knowledge.sh</code></td></tr>\n<tr><td><code>ship</code></td><td>Validate, sync, commit, push</td><td><code>ship.sh</code></td></tr>\n<tr><td><code>global-sync</code></td><td>Import global tooling config</td><td><code>global-knowledge-sync.sh</code></td></tr>\n<tr><td><code>graphify-sync</code></td><td>Import graph artifacts</td><td><code>graphify-sync.sh</code></td></tr>\n<tr><td><code>compact</code></td><td>Prune stale memory and old captures</td><td><code>compact-memory.sh</code></td></tr>\n<tr><td><code>measure-tokens</code></td><td>Token savings estimation (subcommands: compare, log-run, summarize-log)</td><td><code>measure-token-savings.py</code></td></tr>\n<tr><td><code>index</code></td><td>Regenerate knowledge index JSON + md</td><td><code>runtime/index.py</code></td></tr>\n<tr><td><code>search &lt;query&gt;</code></td><td>Search knowledge index, Memory-first</td><td><code>runtime/index.py</code></td></tr>\n<tr><td><code>export-html</code></td><td>Build polished static HTML site</td><td><code>runtime/site.py</code></td></tr>\n<tr><td><code>view</code></td><td>Build site and open in browser</td><td><code>runtime/site.py</code> + webbrowser</td></tr>\n<tr><td><code>clean-import &lt;url&gt;</code></td><td>Import URL/HTML as cleaned evidence</td><td><code>runtime/capture.py</code></td></tr>\n<tr><td><code>export-canvas</code></td><td>Export vault as Obsidian Canvas</td><td><code>runtime/site.py</code></td></tr>\n<tr><td><code>absorb</code></td><td>Ingest existing project docs into Evidence/imports/, parse ADRs into decisions.md</td><td>pure Python</td></tr>\n<tr><td><code>refresh-system</code></td><td>Refresh integration files to current framework version</td><td><code>runtime/refresh.py</code></td></tr>\n<tr><td><code>backfill-history</code></td><td>Backfill lightweight history from git</td><td><code>runtime/history.py</code></td></tr>\n<tr><td><code>migrate-from-legacy</code></td><td>Migrate from agent-knowledge-cli: runs refresh-system + prints pip uninstall steps</td><td>pure Python</td></tr>\n<tr><td><code>completion</code></td><td>Print shell tab-completion setup line (zsh/bash/fish); <code>--install</code> writes to rc file</td><td>pure Python</td></tr>\n<tr><td><code>upgrade</code></td><td>Check PyPI for latest version and upgrade (detects pipx vs pip)</td><td>pure Python</td></tr>\n<tr><td><code>install-global</code></td><td>Write conditional bedrock rules to <code>~/.cursor/</code>, <code>~/.claude/</code>, <code>~/.codex/</code>, <code>~/.gemini/</code>; <code>--uninstall</code> to remove</td><td>pure Python</td></tr>\n<tr><td><code>compact-context</code></td><td>(slash command) Save memory then reset context window</td><td>slash command template</td></tr>\n</table>\n\n<h2>🚀 init</h2>\n\n<ul>\n<li>Infers slug from directory name, detects integrations automatically</li>\n<li><strong>Default (local mode)</strong>: creates <code>./bedrock/</code> as real directory; creates <code>~/agent-os/projects/&lt;slug&gt;/</code> as symlink back; patches <code>.gitignore</code> with noisy-subfolder exclusions</li>\n<li><code>--external</code> flag: creates knowledge in <code>~/agent-os/projects/&lt;slug&gt;/</code>; <code>./bedrock</code> becomes a symlink to that folder</li>\n<li><code>--local</code> flag: accepted as a no-op for backward compatibility (was previously needed, now the default)</li>\n<li>After setup: <strong>auto-calls <code>run_backfill()</code></strong> from <code>history.py</code> if vault exists</li>\n<li>Prints cyan-bordered prompt with next-step suggestion</li>\n</ul>\n\n<h2>🔀 migrate-to-local</h2>\n\n<ul>\n<li>Detects current external vault from symlink</li>\n<li><code>shutil.copytree</code> to temp dir → unlink symlink → move to real <code>./agent-knowledge/</code></li>\n<li>Creates reversed symlink at <code>~/agent-os/projects/&lt;slug&gt;/</code> (skips if already a real dir)</li>\n<li>Updates <code>.agent-project.yaml</code> vault<em>mode + real</em>path via regex</li>\n<li>Calls <code><em>patch</em>gitignore<em>for</em>local_knowledge()</code> — sentinel-guarded, idempotent</li>\n</ul>\n\n<h2>📥 absorb</h2>\n\n<ul>\n<li>Scans project for docs: <code>ARCHITECTURE.md</code>, <code>CHANGELOG.md</code>, <code>DESIGN.md</code>, ADRs, etc.</li>\n<li>Copies to <code>Evidence/imports/</code> as non-canonical evidence</li>\n<li>Parses ADR/decision files into <code>decisions.md</code> (skippable via <code>--no-decisions</code>)</li>\n<li>Writes <code>Outputs/absorb-manifest.md</code> for agent review and curation</li>\n<li>Mechanical ingestion only — curation to <code>Memory/</code> remains the agent&#x27;s responsibility</li>\n</ul>\n\n<h2>🩺 doctor</h2>\n\n<ul>\n<li>Calls <code>doctor.sh</code> (bash)</li>\n<li><strong>Python pre-check 1</strong>: <code>refresh.is_stale()</code> — warns if framework version is behind</li>\n<li><strong>Python pre-check 2</strong>: cursor + claude integration health checks</li>\n<li><strong>Python pre-check 3</strong>: <code>history.history_exists()</code> — warns if History/ missing</li>\n<li><strong>Python pre-check 4</strong>: <code>refresh.check<em>stale</em>notes()</code> — compares each durable-branch note&#x27;s <code>updated</code> date against the most recent git commit on its watched source paths; warns with note path, dates, and <code>update_when</code> hint if source changed after the note was last updated</li>\n</ul>\n\n<h2>🔁 refresh-system</h2>\n\n<ul>\n<li>Refreshes <code>AGENTS.md</code>, <code>.cursor/hooks.json</code>, <code>.cursor/rules/bedrock.mdc</code> (auto-renames from <code>agent-knowledge.mdc</code> if found), <code>CLAUDE.md</code>, <code>.codex/AGENTS.md</code>, <code>STATUS.md</code>, <code>.agent-project.yaml</code></li>\n<li>Idempotent: returns &quot;up-to-date&quot; if version already matches</li>\n<li>Never touches <code>Memory/</code>, <code>Evidence/</code>, <code>Sessions/</code>, <code>Outputs/</code>, <code>History/</code></li>\n<li>Supports <code>--dry-run</code>, <code>--json</code></li>\n</ul>\n\n<h2>📅 backfill-history</h2>\n\n<ul>\n<li>Creates <code>History/events.ndjson</code>, <code>History/history.md</code>, <code>History/timeline/</code></li>\n<li>Reads git: first commit date, total commits, tags (releases), integration detection</li>\n<li>One-per-tag for release events; once-per-month for backfill/integration events</li>\n<li>Supports <code>--dry-run</code>, <code>--json</code>, <code>--force</code></li>\n</ul>\n\n<h2>🌐 export-html / view</h2>\n\n<ul>\n<li>Reads vault → builds <code>knowledge.json</code> → builds <code>graph.json</code> → renders <code>index.html</code></li>\n<li>All data embedded in HTML (no AJAX, works via <code>file://</code>)</li>\n<li>Views: Overview, Tree/Ontology, Note detail, Evidence, Graph tab</li>\n<li>Graph: interactive force-directed canvas, wikilink edges rendered in accent blue, searchable, filterable by type/canonical status</li>\n<li><code>view</code> = <code>export-html</code> + opens result in browser</li>\n</ul>\n\n<h2>🧩 Patterns</h2>\n\n<ul>\n<li>Thin Python wrappers delegate to shell scripts via <code>subprocess</code> for legacy commands</li>\n<li>Pure-Python for newer commands: sync, site, history, refresh, capture, index, absorb</li>\n<li>Common flags: <code>--dry-run</code>, <code>--json</code>, <code>--force</code></li>\n<li>All output to stderr in human mode; stdout is pure JSON in <code>--json</code> mode</li>\n</ul>\n\n<h2>🔄 Core workflow</h2>\n\n<div class=\"mermaid\">flowchart LR\n    init[\"bedrock init\\n(once per project)\"] --> sync\n    sync[\"bedrock sync\\n(after work sessions)\"] --> doctor\n    doctor[\"bedrock doctor\\n(health + staleness)\"]\n    sync --> view[\"bedrock view\\n(browse knowledge site)\"]\n    sync --> ship[\"bedrock ship\\n(commit + push)\"]</div>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-28: <code>init</code> now defaults to local (in-repo) mode; <code>--external</code> flag added to opt out.</li>\n<li>2026-04-28: <code>doctor</code> now runs Python pre-checks for staleness — compares note <code>updated</code> dates against source code commit dates.</li>\n<li>2026-04-28: <code>absorb</code> subcommand added (imports external docs/ADRs into Evidence/).</li>\n<li>2026-04-28: CLI renamed to <code>bedrock</code>; <code>agent-knowledge</code> kept as deprecated alias. All help text, templates, skills, hooks updated.</li>\n<li>2026-04-28: <code>migrate-from-legacy</code> added — runs refresh-system and prints pip migration instructions for agent-knowledge-cli users.</li>\n<li>2026-04-29: vault path changed <code>agent-knowledge/</code> → <code>bedrock/</code> in all CLI commands. <code>migrate-vault</code> added (24 total commands). <code>refresh-system</code> now auto-renames <code>agent-knowledge.mdc</code> → <code>bedrock.mdc</code>. Windows: bash auto-detected, JSON paths use forward slashes, git subprocesses use UTF-8.</li>\n<li>2026-04-30: <code>completion</code> command added (tab completion for zsh/bash/fish, <code>--install</code> flag). <code>upgrade</code> command added (checks PyPI, detects pipx vs pip). <code>/compact-context</code> slash command added for Claude + Cursor. 8 specialist commands hidden from <code>--help</code> (still callable). Total: 27 commands (+ 1 slash command). CI fixed: tests updated for v0.4.0 rename (bedrock paths, local mode default, STATUS.md timestamp format).</li>\n<li>2026-05-05: <code>install-global</code> command added (v0.4.6) — writes conditional bedrock rules to global agent config dirs for Cursor, Claude, Codex, Gemini CLI, Antigravity. Idempotent, <code>--uninstall</code> supported. Total: 28 commands.</li>\n</ul>\n\n<h2>🔗 See Also</h2>\n\n<ul>\n<li><a class=\"wikilink\" data-target=\"architecture\">architecture</a> -- runtime modules</li>\n<li><a class=\"wikilink\" data-target=\"stack\">stack</a> -- click framework, dependencies</li>\n<li><a class=\"wikilink\" data-target=\"testing\">testing</a> -- CLI test coverage</li>\n</ul>\n"},{"path":"Memory/testing.md","title":"🧪 Testing","folder":"Memory","canonical":true,"note_type":"durable-branch","area":"testing","is_branch_entry":true,"updated":"2026-04-30","summary":"Test strategy for packaging validation and CLI correctness. - Framework: pytest (dev dependency). - 151 tests across 2 files: tests/testpackaging.py (","purpose":"Test strategy for packaging validation and CLI correctness. - Framework: pytest (dev dependency). - 151 tests across 2 files: tests/test_packaging.py (23) and tests/test_cli.py (~128). - CI: GitHub Ac...","current_state":[],"recent_changes":[],"open_questions":[],"decision_links":[],"leaves":[],"html":"<h1>🧪 Testing</h1>\n\n<h2>🎯 Purpose</h2>\n\n<p>Test strategy for packaging validation and CLI correctness.</p>\n\n<h2>📊 Current State</h2>\n\n<ul>\n<li>Framework: <code>pytest</code> (dev dependency).</li>\n<li><strong>151 tests</strong> across 2 files: <code>tests/test<em>packaging.py</code> (23) and <code>tests/test</em>cli.py</code> (~128).</li>\n<li>CI: GitHub Actions (<code>.github/workflows/ci.yml</code>) -- ubuntu-latest + macos-latest, Python 3.9/3.12/3.13.</li>\n</ul>\n<p>  - <code>test</code> job: runs <code>pytest</code> with editable install.</p>\n<p>  - <code>build</code> job: builds wheel, installs from wheel, runs CLI smoke tests (<code>--help</code>, <code>--version</code>, subcommand <code>--help</code>).</p>\n\n<h3>📦 test_packaging.py</h3>\n\n<ul>\n<li>Verifies package is importable and <code><strong>version</strong></code> exists.</li>\n<li>Verifies <code>get<em>assets</em>dir()</code> resolves without error.</li>\n<li>Checks all bundled scripts, common lib, templates, rules, and commands exist at expected paths under assets.</li>\n<li>Verifies <code>get_script()</code> returns valid paths and raises <code>FileNotFoundError</code> for missing scripts.</li>\n<li>Verifies <code>capture</code>, <code>index</code>, and <code>viewer</code> modules are importable.</li>\n<li>Verifies <code>Evidence/captures/README.md</code> template is bundled.</li>\n</ul>\n\n<h3>🛠️ test_cli.py</h3>\n\n<ul>\n<li>Top-level <code>--help</code> and <code>--version</code>.</li>\n<li>Parametrized <code>--help</code> for all 23 subcommands (including <code>absorb</code>, <code>migrate-to-local</code>, <code>search</code>, <code>index</code>, <code>export-html</code>, <code>view</code>, <code>clean-import</code>, <code>export-canvas</code>, <code>refresh-system</code>, <code>backfill-history</code>).</li>\n<li><code>init --help</code> contains <code>--slug</code>.</li>\n<li><code>init --dry-run</code> exits 0 and does not create files.</li>\n<li><code>doctor --json</code> output is valid JSON with <code>&quot;script&quot;: &quot;doctor&quot;</code>.</li>\n<li>Smoke test: <code>init</code> in tmp repo -&gt; verifies symlink and <code>.agent-project.yaml</code> created -&gt; <code>doctor --json</code> returns clean result.</li>\n<li><code>measure-tokens</code> with no args shows help text.</li>\n<li>All sync tests: copies memory branches, extracts git log, stamps STATUS.md, JSON output.</li>\n<li>Capture: sync creates <code>.yaml</code> in <code>Evidence/captures/</code>, not in <code>Memory/</code>, idempotent within same minute, dry-run safe.</li>\n<li>Index: sync creates <code>Outputs/knowledge-index.json</code> and <code>.md</code>, Memory notes marked canonical, Evidence/Outputs non-canonical.</li>\n<li>Search: returns results, prefers Memory/ over other folders.</li>\n<li>Export-HTML: creates standalone HTML with badges and non-canonical warnings, idempotent, dry-run safe.</li>\n<li>Hooks: <code>.cursor/hooks.json</code> uses CLI commands (not raw script paths), has required fields.</li>\n<li>Package naming: <code>pyproject.toml</code> name is <code>project-bedrock</code>, scripts entry is <code>agent-knowledge</code>.</li>\n<li>Skills: all expected skill files exist, have frontmatter, and <code>SKILLS.md</code> index is present.</li>\n<li><code>clean-import</code>: imports HTML file, strips nav, does not write to Memory/, dry-run safe, JSON output.</li>\n<li><code>export-canvas</code>: creates valid Canvas JSON in Outputs/, dry-run safe, includes Memory/ nodes, not in Memory/.</li>\n<li>Core CLI flow: <code>init -&gt; sync -&gt; doctor</code> still works; new commands do not create non-markdown files in Memory/.</li>\n<li><code>refresh-system</code>: runs without error, produces clean JSON, dry-run safe, idempotent, never touches Memory/, updates STATUS.md/project-yaml version fields, bundled <code>system-update.md</code> exists and is discoverable.</li>\n<li><code>export-html</code> graph: <code>graph.json</code> created, project node present, canonical distinction enforced, edges reference valid nodes, graph tab in HTML, GRAPH_DATA embedded and parseable, dry-run safe, JSON mode includes graph counts.</li>\n<li><strong>Claude integration</strong>: <code>init</code> installs Claude settings, hooks, commands, and CLAUDE.md; refresh-system updates Claude config; doctor reports Claude health; smoke test <code>init -&gt; doctor</code> with Claude.</li>\n<li><strong>absorb</strong>: help, dry-run no mutation, imports docs and docs/ dir, metadata header present, ADRs parsed into decisions.md, idempotent, manifest created and not in Memory/, JSON mode, exits nonzero without vault, skips vault files itself.</li>\n</ul>\n\n<h3>▶️ Running tests</h3>\n\n<ul>\n<li>All tests run via the installed package (<code>python -m agent_knowledge</code> or editable install).</li>\n<li><code>BIN = [sys.executable, &quot;-m&quot;, &quot;agent_knowledge&quot;]</code> ensures tests use the current Python interpreter.</li>\n<li>Helper <code><em>init</em>repo(tmp_path)</code> creates a git-initialized temp directory for test isolation.</li>\n</ul>\n\n<h2>🕓 Recent Changes</h2>\n\n<ul>\n<li>2026-04-08: Initial test suite created (27 tests).</li>\n<li>2026-04-08: Added 11 new tests for zero-arg init, integrations, onboardin let _view = 'overview';

// ---- Helpers ----
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function badge(folder){
  return `<span class="badge badge-${esc(folder)}">${esc(folder)}</span>`;
}
function encP(s){ return encodeURIComponent(s); }

// ---- Navigation ----
function nav(view, arg){
  if(view==='overview') location.hash='overview';
  else if(view==='note') location.hash='note/'+encP(arg);
  else if(view==='evidence') location.hash='evidence';
  else if(view==='graph') location.hash='graph';
}

function _hideGraph(){
  const gc = document.getElementById('graph-container');
  if(gc) gc.classList.remove('visible');
  if(_simFrame){ cancelAnimationFrame(_simFrame); _simFrame=null; }
  _simRunning = false;
}

function handleHash(){
  const h = location.hash.slice(1);
  if(!h||h==='overview') showOverview();
  else if(h.startsWith('note/')) showNote(decodeURIComponent(h.slice(5)));
  else if(h==='evidence') showEvidence();
  else if(h==='graph') showGraph();
  else showOverview();
}
